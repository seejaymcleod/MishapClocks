<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Mandalas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/game-icons.css" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header>
      <h1>Arcane Weave</h1>
      <div class="controls">
        <div class="segmented-control">
          <button id="btn-view-full" class="btn-segment" data-view="full">Full View</button>
          <button id="btn-view-clean-top" class="btn-segment" data-view="clean-top">Clean Top</button>
          <button id="btn-view-clean-bottom" class="btn-segment" data-view="clean-bottom">Clean Bottom</button>
          <button id="btn-view-bottom-dice" class="btn-segment" data-view="bottom-dice">Bottom + Dice</button>
          <button id="btn-view-radial-axis" class="btn-segment" data-view="radial-axis">Radial Axis</button>
          <button id="btn-view-stacked-pill" class="btn-segment" data-view="stacked-pill">Stacked Badge</button>
          <button id="btn-view-curved-text" class="btn-segment active" data-view="curved-text">Curved Text</button>
        </div>
        <button id="outer-centering-btn" class="btn secondary">Outer Ring: Pinned</button>
        <div id="outer-offset-container" class="btn" style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 0.4rem 0.8rem;">
          <span style="opacity: 0.7;">Pin Offset:</span>
          <input type="range" id="outer-offset-slider" min="3" max="20" step="0.5" value="11" style="cursor: pointer; width: 120px;" />
          <span id="outer-offset-val" style="font-weight: bold; min-width: 35px; text-align: right; color: #fbbf24;">11°</span>
        </div>
        <div id="bottom-shift-container" class="btn" style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 0.4rem 0.8rem;">
          <span style="opacity: 0.7;">Bottom Combo:</span>
          <input type="range" id="bottom-shift-slider" min="-100" max="150" step="5" value="65" style="cursor: pointer; width: 120px;" />
          <span id="bottom-shift-val" style="font-weight: bold; min-width: 35px; text-align: right; color: #fbbf24;">65px</span>
        </div>
        <div id="bottom-icon-container" class="btn" style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 0.4rem 0.8rem;">
          <span style="opacity: 0.7;">Bottom Icon:</span>
          <input type="range" id="bottom-icon-slider" min="-100" max="150" step="5" value="0" style="cursor: pointer; width: 120px;" />
          <span id="bottom-icon-val" style="font-weight: bold; min-width: 35px; text-align: right; color: #fbbf24;">0px</span>
        </div>
        <button id="save-btn" class="btn primary">Save State</button>
        <button id="load-btn" class="btn secondary">Load State</button>
        <input type="file" id="file-input" accept=".json" style="display: none;" />
      </div>
    </header>

    <main class="mandala-container">
      <div class="dashboard-grid">
        <div class="clock-panel">
          <div id="target-mandala" class="svg-container"></div>
          <div id="tier-controls" class="tier-controls-container" style="display: none;"></div>
        </div>
        
        <div class="info-sidebar">
          <div class="info-card">
            <h3>Mishap Tier Parameters</h3>
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>Tier</th>
                  <th>DC</th>
                  <th>Feedback Formula</th>
                </tr>
              </thead>
              <tbody id="tier-parameters-tbody">
                <!-- Dynamically populated from mishap_config.md -->
              </tbody>
            </table>
          </div>
          
          <div class="info-card">
            <h3>Mishap School Roll</h3>
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>d8 Roll</th>
                  <th>School Result</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>6 - 8</strong></td>
                  <td>Original School</td>
                </tr>
                <tr>
                  <td><strong>4 - 5</strong></td>
                  <td>Opposite School</td>
                </tr>
                <tr>
                  <td><strong>2 - 3</strong></td>
                  <td>Opposite Effect</td>
                </tr>
                <tr>
                  <td><strong>1</strong></td>
                  <td>Original School + d8 random school</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal for editing nodes -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">Edit Node</h3>
        <div class="form-group">
          <label for="node-label">Name</label>
          <input type="text" id="node-label" />
        </div>
        <div class="form-group">
          <label for="node-color">Color</label>
          <input type="color" id="node-color" />
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn secondary">Cancel</button>
          <button id="modal-save" class="btn primary">Apply</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
