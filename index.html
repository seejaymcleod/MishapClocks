<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Mandalas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/game-icons.css" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header>
      <h1>Arcane Weave</h1>
      <div class="controls">
        <button id="save-btn" class="btn primary">Save State</button>
        <button id="load-btn" class="btn secondary">Load State</button>
        <input type="file" id="file-input" accept=".json" style="display: none;" />
      </div>
    </header>

    <main class="mandala-container">
      <div class="dashboard-grid">
        <div class="clock-panel">
          <div id="target-mandala" class="svg-container"></div>
          <div id="tier-controls" class="tier-controls-container" style="display: none;"></div>
        </div>
        
        <div class="info-sidebar">
          <div class="info-card">
            <h3>Mishap Tier Parameters</h3>
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>Tier</th>
                  <th>DC</th>
                  <th>Feedback Formula</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>T0</strong></td>
                  <td>DC 9</td>
                  <td>1d4</td>
                </tr>
                <tr>
                  <td><strong>T1</strong></td>
                  <td>DC 11</td>
                  <td>1d6</td>
                </tr>
                <tr>
                  <td><strong>T2</strong></td>
                  <td>DC 13</td>
                  <td>2d6</td>
                </tr>
                <tr>
                  <td><strong>T3</strong></td>
                  <td>DC 15</td>
                  <td>3d6</td>
                </tr>
                <tr>
                  <td><strong>T4</strong></td>
                  <td>DC 17</td>
                  <td>4d8</td>
                </tr>
                <tr>
                  <td><strong>T5</strong></td>
                  <td>DC 19</td>
                  <td>5d8</td>
                </tr>
              </tbody>
            </table>
          </div>
          
          <div class="info-card">
            <h3>Mishap School Roll</h3>
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>d8 Roll</th>
                  <th>School Result</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>6 - 8</strong></td>
                  <td>Original School</td>
                </tr>
                <tr>
                  <td><strong>4 - 5</strong></td>
                  <td>Opposite School</td>
                </tr>
                <tr>
                  <td><strong>2 - 3</strong></td>
                  <td>Opposite Effect</td>
                </tr>
                <tr>
                  <td><strong>1</strong></td>
                  <td>Original School + d8 random school</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal for editing nodes -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">Edit Node</h3>
        <div class="form-group">
          <label for="node-label">Name</label>
          <input type="text" id="node-label" />
        </div>
        <div class="form-group">
          <label for="node-color">Color</label>
          <input type="color" id="node-color" />
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn secondary">Cancel</button>
          <button id="modal-save" class="btn primary">Apply</button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
